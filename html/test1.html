<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>Trang số 1</title>
		<meta charset = "utf-8">
		<style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 10px 0;
			background-color: #e8f5e9; /* xanh lá nhạt */
        }

        th, td {
            border: 1px solid #4caf50;
            padding: 8px;
            text-align: center;
        }

        th {
            background-color: #a5d6a7;
        }

        caption {
            font-weight: bold;
            margin-bottom: 10px;
            text-transform: uppercase;
            color: #2e7d32;
            font-size: 18px;
        }
    </style>
	</head>
	<body>
<table border="1">
	<caption>The result of Maths</caption>
	<tr>
		<th>Name</th>
		<th>Class</th>
		<th>Score</th>
	</tr>
	<tr>
		<td>John Brown</td>
		<td>7A</td>
		<td>85</td>
	</tr>
	<tr>
		<td>Sarah Miller</td>
		<td>7B</td>
		<td>90</td>
	</tr>
</table>
		<br>
		<table border="1">
		  <tr>
			<td>John Brown</td>
			<td>Sarah Miller</td>
			<td>Chris Wilson</td>
		  </tr>
		</table> 
		<br>
		<table border="1">
    <caption>Weekend Plan</caption>

    <tr>
        <th rowspan="2">Time</th>
        <th colspan="2">Weekends</th>
    </tr>
    <tr>
        <th>Saturday</th>
        <th>Sunday</th>
    </tr>

    <tr>
        <td>Morning</td>
        <td>Go swimming</td>
        <td>Visit grandparents</td>
    </tr>
    <tr>
        <td>Afternoon</td>
        <td>Play football</td>
        <td>Do homework</td>
    </tr>
</table>
<br>
<table border="1">
    <caption>Weekend Plan</caption>
    <tr>
        <th rowspan="2">Time</th>
        <th colspan="2">Weekends</th>
    </tr>
    <tr>
        <th>1</th>
        <th>2</th>
    </tr>
    <tr>
        <td>3</td>
        <td>4</td>
        <td>5</td>
    </tr>
    <tr>
        <td>6</td>
        <td>7</td>
        <td>8</td>
    </tr>
</table>
	</body>
</html>
