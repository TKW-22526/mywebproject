<!DOCTYPE html>
<html lang = "vi">
	<head>
		<title>HTML Table</title>
		<meta charset = "utf-8">
		<link rel = "stylesheet" href = "../css/style1.css">
	</head>
	<body>
	<table >
    		<caption>Weekend Plan</caption>
    		<tr class = "header">
        		<th rowspan="2">Time</th>
        		<th colspan="2">Weekends</th>
    		</tr>
    		<tr class = "header">
        		<th>Saturday</th>
        		<th>Sunday</th>
    		</tr>
    		<tr>
        		<td>Morning</td>
        		<td>Go swimming</td>
        		<td>Visit grandparents</td>
    		</tr>
    		<tr>
        		<td>Afternoon</td>
        		<td>Play football</td>
        		<td>Do homework</td>
    		</tr>
	</table>
	</body>
</html>
